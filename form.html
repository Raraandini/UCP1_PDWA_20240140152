<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join Tech Community</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header>
    <nav class="navbar">
      <h2>Tech Community</h2>
      <ul>
        <li><a href="./index.html">Home</a></li>
        <li><a href="./form.html">Join Us</a></li>
        <li><a href="./gallery.html">Multimedia</a></li>
      </ul>
    </nav>
  </header>

  <main class="container">
    <section class="card">
      <h1>Join Tech Community</h1>

      <form id="memberForm">
        <label for="name">Name</label>
        <input type="text" id="name" required>

        <label for="email">Email</label>
        <input type="email" id="email" required>

        <label for="interest">Interest Field</label>
        <select id="interest" required>
          <option value="">Choose your interest</option>
          <option value="Web Development">Web Development</option>
          <option value="UI/UX Design">UI/UX Design</option>
          <option value="Cyber Security">Cyber Security</option>
          <option value="Data Science">Data Science</option>
          <option value="Artificial Intelligence">Artificial Intelligence</option>
        </select>

        <button type="submit" class="btn">Submit</button>
        <a href="./index.html" class="btn secondary">Back to Home</a>
      </form>

      <div id="formResult" class="result"></div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Tech Community</p>
  </footer>

  <script src="./script.js"></script>
</body>
</html>
